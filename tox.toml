requires = ["tox>=4.25"]
env_list = [
    "py",
    "pre-commit",
    "typing",
    "twinecheck",
]

[env.py]
deps = [
    "pytest>=9",
    "pytest-cov>=7.0.0",
    "pytest-xdist>=3.7.0",
]
commands = [
    [
        "pytest",
        { replace = "posargs", default = [
            "--cov-config=pyproject.toml",
            "--cov=src",
            "--cov-report=term-missing",
            "--cov-report=xml",
            "--cov-report=html",
            "--junitxml=py.junit.xml",
            "-o",
            "junit_family=legacy",
            "tests",
        ], extend = true },
    ],
]

[env.pre-commit]
deps = [
    "pre-commit",
]
commands = [
    ["pre-commit", "run", { replace = "posargs", default = ["--all-files"], extend = true }],
]

[env.typing]
deps = [
    "mypy==1.20.0",
    "Scrapy==2.14.2",
]
commands = [
    ["mypy", { replace = "posargs", default = ["src", "tests"], extend = true }],
]

[env.twinecheck]
deps = [
    "twine==6.2.0",
    "build==1.4.2",
]
commands = [
    ["python", "-m", "build", "--sdist"],
    ["twine", "check", "dist/*"],
]
